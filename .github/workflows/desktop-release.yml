name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  checks: read

jobs:
  windows:
    name: Windows desktop package
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}\apps\desktop\src-tauri\target
      RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache backend packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'Directory.Build.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup default stable
          $rustCacheVersion = (rustc --version).Trim() -replace '[^0-9A-Za-z._-]', '-'
          "RUST_CACHE_VERSION=$rustCacheVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache desktop Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: rust-${{ runner.os }}-${{ env.RUST_CACHE_VERSION }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ env.RUST_CACHE_VERSION }}-

      - name: Verify release version
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Release tag '$env:RELEASE_TAG' must look like v0.1.0."
          }

          $expectedVersion = $env:RELEASE_TAG.Substring(1)
          $tauriConfig = Get-Content 'apps/desktop/src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json
          $cargoToml = Get-Content 'apps/desktop/src-tauri/Cargo.toml' -Raw

          if ($cargoToml -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
            throw 'Could not read the desktop Cargo.toml package version.'
          }

          $cargoVersion = $Matches[1]

          if ($tauriConfig.version -ne $expectedVersion) {
            throw "Release tag '$env:RELEASE_TAG' does not match tauri.conf.json version '$($tauriConfig.version)'."
          }

          if ($cargoVersion -ne $expectedVersion) {
            throw "Release tag '$env:RELEASE_TAG' does not match Cargo.toml version '$cargoVersion'."
          }

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Restore backend
        shell: pwsh
        run: dotnet restore .\KM.Editor.slnx

      - name: Verify release source passed validation
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $parentLine = (git show -s --format='%P' $env:GITHUB_SHA).Trim()
          $parents = @($parentLine -split '\s+' | Where-Object { $_ })
          if ($parents.Count -ne 2) {
            throw "Release source '$env:GITHUB_SHA' must be a validated pull request merge commit."
          }

          $validatedCommit = $parents[1]
          git diff --quiet $validatedCommit $env:GITHUB_SHA --
          if ($LASTEXITCODE -ne 0) {
            throw "Release source '$env:GITHUB_SHA' does not match validated pull request head '$validatedCommit'."
          }

          $responseJson = gh api `
            --method GET `
            -H 'Accept: application/vnd.github+json' `
            "repos/$env:GITHUB_REPOSITORY/commits/$validatedCommit/check-runs?per_page=100"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not read validation checks for '$validatedCommit'."
          }

          $checkRuns = @(($responseJson | ConvertFrom-Json).check_runs)
          $requiredChecks = @(
            'Validation / Desktop',
            'Validation / Core and formats',
            'Validation / Sword and Shield general',
            'Validation / Sword and Shield other cleanup hooks',
            'Validation / Sword and Shield other behavior hooks',
            'Validation / Scarlet and Violet integration',
            'Validation / Pokemon Legends Z-A integration',
            'Validation / Shared bridge integration'
          )

          foreach ($requiredCheck in $requiredChecks) {
            $successfulRuns = @($checkRuns | Where-Object {
              $_.name -eq $requiredCheck -and
              $_.status -eq 'completed' -and
              $_.conclusion -eq 'success'
            })
            if ($successfulRuns.Count -eq 0) {
              throw "Required check '$requiredCheck' did not pass for '$validatedCommit'."
            }
          }

          Write-Host "Release source matches validated pull request head $validatedCommit."

      - name: Build desktop packages
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'TAURI_SIGNING_PRIVATE_KEY must be configured as a GitHub Actions secret before building updater artifacts.'
          }

          pnpm --dir apps/desktop exec tauri build --ci --bundles 'nsis,msi'

      - name: Stage release assets
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'apps/desktop/dist/release'
          Remove-Item $releaseDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $releaseDir | Out-Null

          Copy-Item (Join-Path $env:CARGO_TARGET_DIR 'release/bundle/nsis/*.exe') $releaseDir
          Copy-Item (Join-Path $env:CARGO_TARGET_DIR 'release/bundle/msi/*.msi') $releaseDir
          Get-ChildItem (Join-Path $env:CARGO_TARGET_DIR 'release/bundle') -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '\.(nsis|msi)\.zip$' -or $_.Name -match '\.sig$' } |
            ForEach-Object { Copy-Item $_.FullName $releaseDir }

          Get-ChildItem $releaseDir -File |
            Where-Object { $_.Name.Contains(' ') } |
            ForEach-Object {
              $safeName = $_.Name.Replace(' ', '.')
              Rename-Item -LiteralPath $_.FullName -NewName $safeName
            }

          $nsisInstallers = @(Get-ChildItem $releaseDir -File -Filter '*.exe' | Sort-Object Name)
          $msiInstallers = @(Get-ChildItem $releaseDir -File -Filter '*.msi' | Sort-Object Name)

          if ($nsisInstallers.Count -ne 1) {
            throw "Expected exactly one NSIS updater installer, found $($nsisInstallers.Count)."
          }

          if ($msiInstallers.Count -ne 1) {
            throw "Expected exactly one MSI updater installer, found $($msiInstallers.Count)."
          }

          $version = $env:RELEASE_TAG.TrimStart('v')
          function New-UpdaterPlatform($installer) {
            $signaturePath = Join-Path $releaseDir "$($installer.Name).sig"
            if (-not (Test-Path -LiteralPath $signaturePath)) {
              throw "Could not find updater signature '$($installer.Name).sig'."
            }

            $assetName = [System.Uri]::EscapeDataString($installer.Name)
            return [ordered]@{
              signature = (Get-Content -LiteralPath $signaturePath -Raw).Trim()
              url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG/$assetName"
            }
          }

          $nsisPlatform = New-UpdaterPlatform $nsisInstallers[0]
          $msiPlatform = New-UpdaterPlatform $msiInstallers[0]
          $latestJson = [ordered]@{
            version = $version
            notes = "See the GitHub Release notes for KM Editor $env:RELEASE_TAG."
            pub_date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            platforms = [ordered]@{
              'windows-x86_64-nsis' = $nsisPlatform
              'windows-x86_64-msi' = $msiPlatform
              # Older clients only know the generic key, so keep NSIS as their fallback.
              'windows-x86_64' = $nsisPlatform
            }
          }

          $latestJson |
            ConvertTo-Json -Depth 8 |
            Set-Content -Path (Join-Path $releaseDir 'latest.json') -Encoding utf8

          $hashLines = Get-ChildItem $releaseDir -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 -Path $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }

          $hashLines | Set-Content -Path (Join-Path $releaseDir 'SHA256SUMS.txt') -Encoding utf8
          Get-ChildItem $releaseDir -File | Sort-Object Name | Format-Table Name, Length

      - name: Create draft GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'apps/desktop/dist/release'
          $assets = Get-ChildItem $releaseDir -File | Sort-Object Name | ForEach-Object { $_.FullName }
          $arguments = @(
            'release',
            'create',
            $env:RELEASE_TAG
          ) + $assets + @(
            '--repo',
            $env:GITHUB_REPOSITORY,
            '--target',
            $env:GITHUB_SHA,
            '--title',
            "KM Editor $env:RELEASE_TAG",
            '--draft',
            '--generate-notes'
          )

          if ($env:RELEASE_PRERELEASE -eq 'true') {
            $arguments += '--prerelease'
          }

          gh @arguments
