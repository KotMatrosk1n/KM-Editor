name: Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  desktop:
    name: Build / Desktop
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}\apps\desktop\src-tauri\target
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node.js with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Check tracked workspace paths
        shell: pwsh
        run: pnpm run check:workspace

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup default 1.96.0
          $rustCacheVersion = (rustc --version).Trim() -replace '[^0-9A-Za-z._-]', '-'
          "RUST_CACHE_VERSION=$rustCacheVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: rust-${{ runner.os }}-${{ env.RUST_CACHE_VERSION }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ env.RUST_CACHE_VERSION }}-

      - name: Install desktop dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Build desktop interface
        shell: pwsh
        run: pnpm build

      - name: Compile native desktop shell
        shell: pwsh
        env:
          TAURI_CONFIG: '{"bundle":{"externalBin":[]}}'
        run: cargo check --locked --manifest-path apps/desktop/src-tauri/Cargo.toml

  backend:
    name: Build / Backend
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache backend packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'Directory.Build.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore backend dependencies
        shell: pwsh
        run: dotnet restore KM.Editor.slnx

      - name: Build backend
        shell: pwsh
        run: dotnet build KM.Editor.slnx --no-restore --nologo
